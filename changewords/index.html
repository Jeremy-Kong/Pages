<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石历文转换器 - 双语象形版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #d4af37; --bg: #0a0908; --panel: #151412; }
        body { 
            font-family: "Noto Serif SC", "SimSun", serif;
            background: var(--bg); 
            color: #e8e6e1; 
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #2a2520; margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 2.2rem; letter-spacing: 0.2em; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        .subtitle { color: #5a5040; font-size: 0.85rem; letter-spacing: 0.15em; margin-top: 8px; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
        
        .panel {
            background: var(--panel);
            border: 1px solid #2a2520;
            border-radius: 8px;
            padding: 25px;
        }
        
        textarea { 
            width: 100%; height: 140px; 
            background: rgba(0,0,0,0.3);
            border: 1px solid #3d3528; color: #e8e6e1; 
            padding: 12px; font-size: 16px; resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: var(--gold); }
        
        .options { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .option-row {
            display: flex; align-items: center; gap: 8px;
            color: #8b7355; font-size: 0.9rem; cursor: pointer;
        }
        .option-row input { accent-color: var(--gold); }
        
        button { 
            background: linear-gradient(135deg, #3d3528, #252220);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 10px 20px; cursor: pointer; border-radius: 4px;
            transition: all 0.3s; font-family: inherit;
        }
        button:hover { background: var(--gold); color: #000; }
        button.secondary { border-color: #4a4233; color: #8b7355; }
        button.secondary:hover { border-color: var(--gold); color: var(--gold); background: transparent; }
        
        .output-area { min-height: 500px; }
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #2a2520;
            flex-wrap: wrap; gap: 10px;
        }
        .stats { color: #6b5d4d; font-size: 0.85rem; }
        
        .glyph-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
            gap: 15px;
        }
        
        .glyph-card { 
            aspect-ratio: 1; 
            background: linear-gradient(135deg, #1a1814 0%, #0f0e0c 100%);
            border: 2px solid #3d3528;
            border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer; transition: all 0.3s;
            padding: 8px;
        }
        
        /* 汉字样式 - 金色粗线 */
        .glyph-card.cn { border-color: #4a4233; }
        .glyph-card.cn:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.25); }
        
        /* 英文大写 - 神圣双边框 */
        .glyph-card.en-upper { 
            border: 3px double #5a5040; 
            background: linear-gradient(135deg, #252220 0%, #1a1814 100%);
        }
        .glyph-card.en-upper::before {
            content: '◆'; position: absolute; top: -8px; left: 50%;
            transform: translateX(-50%); color: var(--gold); font-size: 10px;
            background: var(--bg); padding: 0 4px;
        }
        .glyph-card.en-upper:hover { border-color: var(--gold); }
        
        /* 英文小写 - 细线 */
        .glyph-card.en-lower { border-color: #2a2520; opacity: 0.9; }
        .glyph-card.en-lower:hover { border-color: #5a5040; opacity: 1; }
        
        /* 数字 - 点线系统 */
        .glyph-card.num { border-style: dashed; border-color: #4a4233; }
        .glyph-card.num:hover { border-style: solid; border-color: var(--gold); }
        
        .glyph-svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        
        .glyph-label {
            position: absolute; bottom: 4px;
            font-size: 10px; color: #5a5040;
            opacity: 0; transition: opacity 0.3s;
            background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 3px;
        }
        .glyph-card:hover .glyph-label { opacity: 1; color: var(--gold); }
        
        .empty-state { color: #4a4233; text-align: center; padding: 80px 20px; font-style: italic; grid-column: 1/-1; }
        
        .legend {
            margin-top: 25px; padding-top: 20px; border-top: 1px solid #2a2520;
            display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.8rem; color: #5a5040;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-box { width: 16px; height: 16px; border: 2px solid #4a4233; border-radius: 3px; }
        .legend-box.cn { border-color: var(--gold); border-width: 2px; }
        .legend-box.en-upper { border: 3px double #5a5040; }
        .legend-box.en-lower { border-color: #2a2520; opacity: 0.7; }
        .legend-box.num { border-style: dashed; }
        
        footer { text-align: center; padding: 30px; color: #3d3528; font-size: 0.85rem; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>石历文转换器</h1>
            <div class="subtitle">汉字象形 · 英文神圣 · 玛雅数字</div>
        </header>
        
        <div class="main-grid">
            <div class="panel input-panel">
                <label style="color:var(--gold); display:block; margin-bottom:8px;">输入内容</label>
                <textarea id="input" placeholder="支持中英文混合输入..." autofocus>Hello 世界 2024</textarea>
                
                <div class="options">
                    <label class="option-row">
                        <input type="checkbox" id="realtime" checked>
                        <span>实时转换</span>
                    </label>
                    <label class="option-row">
                        <input type="checkbox" id="showLabel" checked>
                        <span>显示原字符</span>
                    </label>
                    <label class="option-row">
                        <input type="checkbox" id="showSpace">
                        <span>显示空格占位</span>
                    </label>
                </div>
                
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button onclick="manualConvert()" style="flex:1;">手动转换</button>
                    <button class="secondary" onclick="clearAll()">清空</button>
                </div>
                
                <div style="margin-top:20px; padding-top:20px; border-top:1px solid #2a2520; font-size:0.85rem; color:#6b5d4d; line-height:1.8;">
                    <strong style="color:var(--gold);">支持字符：</strong><br>
                    • 汉字：常用3500字象形符号<br>
                    • 英文：A-Z神圣风格 / a-z几何风格<br>
                    • 数字：0-9玛雅点线系统<br>
                    • 符号：常用标点自动识别
                </div>
            </div>
            
            <div class="panel output-area">
                <div class="toolbar">
                    <div class="stats" id="stats">等待输入...</div>
                    <button onclick="copySVG()" style="font-size:0.85rem;">复制SVG代码</button>
                </div>
                
                <div class="glyph-container" id="container">
                    <div class="empty-state">在左侧输入文字，此处显示石历文转换结果</div>
                </div>
                
                <div class="legend">
                    <div class="legend-item"><div class="legend-box cn"></div> <span>汉字象形</span></div>
                    <div class="legend-item"><div class="legend-box en-upper"></div> <span>英文大写（神圣）</span></div>
                    <div class="legend-item"><div class="legend-box en-lower"></div> <span>英文小写（几何）</span></div>
                    <div class="legend-item"><div class="legend-box num"></div> <span>数字（玛雅）</span></div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>石历文系统 v2.0 | 汉字保留石碑雕刻美学 | 英文大写带神圣冠饰</p>
        </footer>
    </div>

        function convertChar(char) {
            // 优先级：汉字 > 大写 > 小写 > 数字 > 标点 > 生僻
            if (cnLib[char]) return {svg: cnLib[char], type: 'cn', char};
            if (enUpper[char]) return {svg: enUpper[char], type: 'en-upper', char};
            if (enLower[char]) return {svg: enLower[char], type: 'en-lower', char};
            if (numbers[char]) return {svg: numbers[char], type: 'num', char};
            if (puncts[char]) {
                if (puncts[char] === 'space') return {type: 'space'};
                return {svg: puncts[char], type: 'punct', char};
            }
            return {...generateRare(char), char};
        }

        function render() {
            const input = document.getElementById('input').value;
            const container = document.getElementById('container');
            const stats = document.getElementById('stats');
            const showLabel = document.getElementById('showLabel').checked;
            const showSpace = document.getElementById('showSpace').checked;
            
            if (!input) {
                container.innerHTML = '<div class="empty-state">输入文字以查看转换结果</div>';
                stats.textContent = '等待输入...';
                return;
            }
            
            container.innerHTML = '';
            let count = 0;
            let types = {cn:0, 'en-upper':0, 'en-lower':0, num:0, punct:0, rare:0};
            
            for (let char of input) {
                const g = convertChar(char);
                
                if (g.type === 'space') {
                    if (showSpace) {
                        const div = document.createElement('div');
                        div.className = 'glyph-card';
                        div.style.opacity = '0.2';
                        div.style.borderStyle = 'dashed';
                        container.appendChild(div);
                    }
                    continue;
                }
                
                const card = document.createElement('div');
                card.className = `glyph-card ${g.type}`;
                card.innerHTML = `
                    <svg class="glyph-svg" viewBox="0 0 100 100">${g.svg}</svg>
                    ${showLabel ? `<span class="glyph-label">${char}</span>` : ''}
                `;
                card.title = `${char} (${g.type})`;
                card.onclick = () => {
                    // 点击复制SVG
                    navigator.clipboard.writeText(`<svg viewBox="0 0 100 100">${g.svg}</svg>`);
                    card.style.borderColor = '#d4af37';
                    setTimeout(() => card.style.borderColor = '', 300);
                };
                
                container.appendChild(card);
                count++;
                types[g.type] = (types[g.type] || 0) + 1;
            }
            
            // 统计文本
            const parts = [];
            if (types.cn) parts.push(`${types.cn}汉字`);
            if (types['en-upper']) parts.push(`${types['en-upper']}大写`);
            if (types['en-lower']) parts.push(`${types['en-lower']}小写`);
            if (types.num) parts.push(`${types.num}数字`);
            if (types.punct) parts.push(`${types.punct}标点`);
            
            stats.textContent = `共 ${count} 字符 ${parts.length ? '(' + parts.join(' · ') + ')' : ''}`;
        }

        // 事件绑定
        function init() {
            const input = document.getElementById('input');
            const realtime = document.getElementById('realtime');
            
            const doConvert = () => { if (realtime.checked) render(); };
            
            input.addEventListener('input', doConvert);
            document.getElementById('showLabel').addEventListener('change', render);
            document.getElementById('showSpace').addEventListener('change', render);
            
            render();
        }

        function manualConvert() { render(); }
        
        function clearAll() {
            document.getElementById('input').value = '';
            render();
            document.getElementById('input').focus();
        }

        function copySVG() {
            const all = Array.from(document.querySelectorAll('.glyph-svg')).map(s => s.innerHTML).join('\n');
            navigator.clipboard.writeText(all).then(() => alert('已复制所有SVG路径到剪贴板'));
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
