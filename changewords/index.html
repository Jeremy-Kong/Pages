<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石历文转换器 - Lithocal Converter (Universal)</title>
    <meta name="description" content="实时将中文、英文、数字转换为玛雅风格象形文字">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --gold: #d4af37; 
            --bg: #0a0908; 
            --panel: #151412;
            --border: #2a2520;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Serif SC", serif;
            background: var(--bg); 
            color: #e8e6e1; 
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        header { 
            text-align: center; 
            padding: 30px 0; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 20px;
        }
        h1 { 
            color: var(--gold); 
            font-size: 2rem; 
            letter-spacing: 0.15em; 
            text-shadow: 0 0 20px rgba(212,175,55,0.3);
        }
        .subtitle { color: #5a5040; font-size: 0.85rem; margin-top: 5px; letter-spacing: 0.2em; }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        @media (min-width: 768px) {
            .main-layout {
                grid-template-columns: 300px 1fr;
            }
        }
        
        .input-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
        }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-size: 0.9rem; }
        
        textarea { 
            width: 100%; 
            height: 150px; 
            background: rgba(0,0,0,0.3);
            border: 1px solid #3d3528; 
            color: #e8e6e1; 
            padding: 12px;
            font-size: 16px; 
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: var(--gold); }
        
        .options { margin-top: 15px; }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: #8b7355;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .option-item input[type="checkbox"] {
            accent-color: var(--gold);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .output-panel {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            min-height: 500px;
        }
        
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stats { color: #6b5d4d; font-size: 0.85rem; }
        
        .btn-group { display: flex; gap: 8px; }
        button { 
            background: transparent;
            border: 1px solid #4a4233;
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        button:hover { background: var(--gold); color: #000; border-color: var(--gold); }
        
        .glyph-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 12px;
        }
        
        .glyph-block { 
            aspect-ratio: 1; 
            background: linear-gradient(135deg, #1a1814 0%, #0f0e0c 100%);
            border: 1px solid #3d3528;
            border-radius: 6px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px;
        }
        
        .glyph-block:hover { 
            border-color: var(--gold); 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212,175,55,0.2);
        }
        
        .glyph-block.space {
            background: transparent;
            border-style: dashed;
            opacity: 0.3;
        }
        
        .glyph-block.punctuation {
            border-color: #4a4233;
            background: rgba(212,175,55,0.05);
        }
        
        .glyph-block.uppercase {
            border-width: 2px;
            border-color: #5a5040;
            background: linear-gradient(135deg, #2a2520 0%, #1a1814 100%);
        }
        
        .glyph-block.uppercase::before {
            content: '◆';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            font-size: 10px;
            background: var(--bg);
            padding: 0 4px;
        }
        
        .glyph-svg { 
            width: 100%; 
            height: 100%; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }
        
        .glyph-tag {
            position: absolute;
            bottom: 2px;
            font-size: 9px;
            color: #4a4233;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .glyph-block:hover .glyph-tag { opacity: 1; }
        
        .empty-state {
            text-align: center;
            color: #4a4233;
            padding: 60px 20px;
            grid-column: 1 / -1;
            font-style: italic;
        }
        
        .category-legend {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.8rem;
            color: #5a5040;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-box { width: 12px; height: 12px; border: 1px solid; border-radius: 2px; }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: #3d3528;
            font-size: 0.85rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>石历文转换器</h1>
            <div class="subtitle">支持中英文、数字、符号实时转换</div>
        </header>
        
        <div class="main-layout">
            <div class="input-panel">
                <div class="input-group">
                    <label>输入内容</label>
                    <textarea id="input" placeholder="输入任意文字（中文、English、123、!@#）..." autofocus>Hello 世界 2024</textarea>
                </div>
                
                <div class="options">
                    <label class="option-item">
                        <input type="checkbox" id="realtime" checked>
                        <span>实时转换</span>
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="showTags" checked>
                        <span>显示原字符</span>
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="uppercaseSpecial" checked>
                        <span>大写字母特殊标记</span>
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="keepSpace">
                        <span>保留空格占位</span>
                    </label>
                </div>
                
                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                    <button onclick="clearText()" style="width: 100%;">清空内容</button>
                </div>
            </div>
            
            <div class="output-panel">
                <div class="toolbar">
                    <div class="stats" id="stats">等待输入...</div>
                    <div class="btn-group">
                        <button onclick="copyText()">复制文本</button>
                        <button onclick="downloadSVG()">导出SVG</button>
                    </div>
                </div>
                
                <div class="glyph-grid" id="grid">
                    <div class="empty-state">在左侧输入文字，此处实时显示石历文</div>
                </div>
                
                <div class="category-legend">
                    <div class="legend-item">
                        <div class="legend-box" style="border-color: var(--gold);"></div>
                        <span>中文象形</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box" style="border-color: #5a5040; border-width: 2px;"></div>
                        <span>英文大写</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box" style="border-color: #3d3528;"></div>
                        <span>英文小写/数字</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box" style="border-style: dashed; opacity: 0.5;"></div>
                        <span>空格</span>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>石历文系统 | 玛雅美学 | 实时转换引擎</p>
        </footer>
    </div>

            't': '<line x1="50" y1="28" x2="50" y2="68" stroke="#d4af37" stroke-width="2.5"/><line x1="35" y1="40" x2="65" y2="40" stroke="#d4af37" stroke-width="2"/><path d="M50 68v2q0 6 8 6" fill="none" stroke="#d4af37" stroke-width="2"/>',
            'u': '<path d="M38 35v25q0 10 12 10t12-10V35" fill="none" stroke="#d4af37" stroke-width="2.5"/><circle cx="50" cy="68" r="3" fill="#d4af37"/>',
            'v': '<path d="M38 35l12 35 12-35" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linejoin="round"/>',
            'w': '<path d="M30 35l10 35 10-20 10 20 10-35" fill="none" stroke="#d4af37" stroke-width="2.5"/>',
            'x': '<path d="M38 38l24 32M62 38L38 70" stroke="#d4af37" stroke-width="2.5"/>',
            'y': '<path d="M38 35l12 20v15M62 35L50 55" stroke="#d4af37" stroke-width="2.5"/><circle cx="50" cy="70" r="3" fill="#d4af37"/>',
            'z': '<path d="M38 38h24L38 68h24" stroke="#d4af37" stroke-width="2.5" fill="none"/>'
        };

        // 数字（玛雅风格点线系统）
        const numbers = {
            '0': '<ellipse cx="50" cy="50" rx="18" ry="22" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-dasharray="4,2"/><circle cx="50" cy="50" r="3" fill="#d4af37"/>',
            '1': '<line x1="50" y1="30" x2="50" y2="70" stroke="#d4af37" stroke-width="4" stroke-linecap="round"/><circle cx="50" cy="50" r="4" fill="#d4af37"/>',
            '2': '<line x1="40" y1="35" x2="40" y2="65" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/><line x1="60" y1="35" x2="60" y2="65" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>',
            '3': '<circle cx="35" cy="40" r="4" fill="#d4af37"/><circle cx="50" cy="40" r="4" fill="#d4af37"/><circle cx="65" cy="40" r="4" fill="#d4af37"/><line x1="35" y1="60" x2="65" y2="60" stroke="#d4af37" stroke-width="2"/>',
            '4': '<circle cx="35" cy="35" r="4" fill="#d4af37"/><circle cx="65" cy="35" r="4" fill="#d4af37"/><circle cx="35" cy="65" r="4" fill="#d4af37"/><circle cx="65" cy="65" r="4" fill="#d4af37"/>',
            '5': '<line x1="30" y1="40" x2="70" y2="40" stroke="#d4af37" stroke-width="3"/><circle cx="50" cy="60" r="5" fill="none" stroke="#d4af37" stroke-width="2"/>',
            '6': '<line x1="30" y1="35" x2="70" y2="35" stroke="#d4af37" stroke-width="3"/><circle cx="40" cy="60" r="4" fill="#d4af37"/><circle cx="60" cy="60" r="4" fill="#d4af37"/>',
            '7': '<line x1="30" y1="35" x2="70" y2="35" stroke="#d4af37" stroke-width="3"/><circle cx="35" cy="60" r="3" fill="#d4af37"/><circle cx="50" cy="65" r="3" fill="#d4af37"/><circle cx="65" cy="60" r="3" fill="#d4af37"/>',
            '8': '<circle cx="35" cy="35" r="4" fill="#d4af37"/><circle cx="65" cy="35" r="4" fill="#d4af37"/><line x1="30" y1="55" x2="70" y2="55" stroke="#d4af37" stroke-width="2"/><circle cx="35" cy="70" r="4" fill="#d4af37"/><circle cx="65" cy="70" r="4" fill="#d4af37"/>',
            '9': '<line x1="30" y1="30" x2="70" y2="30" stroke="#d4af37" stroke-width="3"/><line x1="30" y1="50" x2="70" y2="50" stroke="#d4af37" stroke-width="3"/><circle cx="35" cy="70" r="4" fill="#d4af37"/><circle cx="50" cy="70" r="4" fill="#d4af37"/><circle cx="65" cy="70" r="4" fill="#d4af37"/>'
        };

        // 标点符号
        const punctuation = {
            ' ': 'space',
            '，': '<path d="M35 65q15 10 30 0" fill="none" stroke="#d4af37" stroke-width="2"/><circle cx="50" cy="75" r="2" fill="#d4af37"/>',
            '。': '<circle cx="50" cy="70" r="4" fill="#d4af37"/><circle cx="50" cy="70" r="8" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>',
            '！': '<line x1="50" y1="25" x2="50" y2="55" stroke="#d4af37" stroke-width="3"/><circle cx="50" cy="68" r="4" fill="#d4af37"/>',
            '？': '<path d="M40 30q0-10 10-10t10 10q0 8-10 12v8" fill="none" stroke="#d4af37" stroke-width="2.5"/><circle cx="50" cy="68" r="3" fill="#d4af37"/>',
            '：': '<circle cx="50" cy="38" r="3" fill="#d4af37"/><circle cx="50" cy="62" r="3" fill="#d4af37"/>',
            '；': '<circle cx="50" cy="38" r="3" fill="#d4af37"/><path d="M45 65q5 10 10 0" fill="none" stroke="#d4af37" stroke-width="2"/>',
            '、': '<line x1="45" y1="65" x2="55" y2="75" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>',
            '.': '<circle cx="50" cy="70" r="3" fill="#d4af37"/>',
            ',': '<path d="M45 65l5 15" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>',
            '!': '<line x1="50" y1="25" x2="50" y2="55" stroke="#d4af37" stroke-width="3"/><circle cx="50" cy="65" r="3" fill="#d4af37"/>',
            '?': '<path d="M40 30q0-8 10-8t10 8q0 6-10 10v6" fill="none" stroke="#d4af37" stroke-width="2.5"/><circle cx="50" cy="65" r="3" fill="#d4af37"/>',
            ':': '<circle cx="50" cy="40" r="3" fill="#d4af37"/><circle cx="50" cy="60" r="3" fill="#d4af37"/>',
            ';': '<circle cx="50" cy="40" r="3" fill="#d4af37"/><path d="M48 62l4 8" stroke="#d4af37" stroke-width="2"/>',
            '-': '<line x1="30" y1="50" x2="70" y2="50" stroke="#d4af37" stroke-width="2"/>',
            '—': '<line x1="20" y1="50" x2="80" y2="50" stroke="#d4af37" stroke-width="3"/>',
            '…': '<circle cx="35" cy="70" r="2" fill="#d4af37"/><circle cx="50" cy="70" r="2" fill="#d4af37"/><circle cx="65" cy="70" r="2" fill="#d4af37"/>'
        };

        // 生僻字生成器（基于Unicode）
        function generateRare(char) {
            const code = char.charCodeAt(0);
            const hash = code % 26;
            const letters = 'abcdefghijklmnopqrstuvwxyz';
            const base = enLower[letters[hash]] || enLower['a'];
            
            // 添加修饰表示生僻
            const modifier = `<circle cx="50" cy="15" r="2" fill="#d4af37" opacity="0.6"/>
                             <circle cx="15" cy="50" r="2" fill="#d4af37" opacity="0.6"/>
                             <circle cx="85" cy="50" r="2" fill="#d4af37" opacity="0.6"/>`;
            return {svg: base + modifier, type: 'rare'};
        }

        // 核心转换函数
        function getGlyph(char) {
            // 1. 中文标准库
            if (cnLib[char]) return {svg: cnLib[char], type: 'cn', char};
            
            // 2. 英文大写
            if (enUpper[char]) return {svg: enUpper[char], type: 'upper', char};
            
            // 3. 英文小写
            if (enLower[char]) return {svg: enLower[char], type: 'lower', char};
            
            // 4. 数字
            if (numbers[char]) return {svg: numbers[char], type: 'num', char};
            
            // 5. 标点
            if (punctuation[char]) {
                if (punctuation[char] === 'space') return {type: 'space'};
                return {svg: punctuation[char], type: 'punct', char};
            }
            
            // 6. 其他生僻字符
            return {...generateRare(char), char};
        }

        // 实时转换主函数
        function convert() {
            const input = document.getElementById('input').value;
            const grid = document.getElementById('grid');
            const stats = document.getElementById('stats');
            const showTags = document.getElementById('showTags').checked;
            const upperSpecial = document.getElementById('uppercaseSpecial').checked;
            const keepSpace = document.getElementById('keepSpace').checked;
            
            if (!input) {
                grid.innerHTML = '<div class="empty-state">输入文字以查看转换结果</div>';
                stats.textContent = '等待输入...';
                return;
            }
            
            grid.innerHTML = '';
            let count = 0;
            let types = {cn:0, upper:0, lower:0, num:0, punct:0, space:0, rare:0};
            
            for (let char of input) {
                const g = getGlyph(char);
                
                if (g.type === 'space') {
                    if (keepSpace) {
                        const div = document.createElement('div');
                        div.className = 'glyph-block space';
                        grid.appendChild(div);
                        types.space++;
                    }
                    continue;
                }
                
                const div = document.createElement('div');
                div.className = 'glyph-block';
                
                if (g.type === 'upper' && upperSpecial) div.classList.add('uppercase');
                if (g.type === 'punct') div.classList.add('punctuation');
                
                div.innerHTML = `<svg class="glyph-svg" viewBox="0 0 100 100">${g.svg}</svg>`;
                if (showTags) div.innerHTML += `<span class="glyph-tag">${char}</span>`;
                
                div.title = `字符: ${char} | 类型: ${g.type}`;
                div.onclick = () => copyGlyph(g.svg);
                
                grid.appendChild(div);
                count++;
                types[g.type] = (types[g.type] || 0) + 1;
            }
            
            // 更新统计
            const statText = [];
            if (types.cn) statText.push(`${types.cn}中文`);
            if (types.upper) statText.push(`${types.upper}大写`);
            if (types.lower) statText.push(`${types.lower}小写`);
            if (types.num) statText.push(`${types.num}数字`);
            if (types.punct) statText.push(`${types.punct}标点`);
            if (types.space) statText.push(`${types.space}空格`);
            if (types.rare) statText.push(`${types.rare}生僻`);
            
            stats.textContent = `共 ${count} 字符 (${statText.join(' · ')})`;
        }

        // 复制单个字符SVG
        function copyGlyph(svg) {
            const fullSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">${svg}</svg>`;
            navigator.clipboard.writeText(fullSVG).then(() => {
                // 临时提示
                const btn = event.currentTarget;
                const original = btn.style.borderColor;
                btn.style.borderColor = '#d4af37';
                setTimeout(() => btn.style.borderColor = original, 300);
            });
        }

        // 清空
        function clearText() {
            document.getElementById('input').value = '';
            convert();
            document.getElementById('input').focus();
        }

        // 复制全部文本
        function copyText() {
            const input = document.getElementById('input').value;
            navigator.clipboard.writeText(input).then(() => alert('原文已复制'));
        }

        // 导出SVG（简化版提示）
        function downloadSVG() {
            alert('提示：可使用浏览器"打印"功能保存为PDF，或截图保存转换结果。');
        }

        // 事件监听
        document.getElementById('input').addEventListener('input', () => {
            if (document.getElementById('realtime').checked) convert();
        });

        // 选项变更实时更新
        ['showTags', 'uppercaseSpecial', 'keepSpace'].forEach(id => {
            document.getElementById(id).addEventListener('change', convert);
        });

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            convert();
            document.getElementById('input').focus();
        });
    </script>
</body>
